<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%238b5cf6'/%3E%3Cpath d='M10 8 L10 24 M10 8 L22 8 M10 15 L18 15' stroke='white' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="FluentFlow - English Learning Platform" />
    <meta name="theme-color" content="#ffffff" id="theme-color-meta" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.json" />
    <title>FluentFlow</title>
</head>

<body>
    <div id="root"></div>

    <!-- Offline/load-failure fallback (hidden by default, shown by timer if React never mounts) -->
    <div id="app-fallback" style="display:none;padding:2rem;text-align:center;font-family:system-ui,sans-serif;">
        <p style="font-size:1.125rem;margin-bottom:1rem;color:#374151;">Loading failed — please check your connection.</p>
        <button onclick="window.location.reload()" style="padding:0.625rem 1.5rem;font-size:1rem;background:#3b82f6;color:#fff;border:none;border-radius:0.5rem;cursor:pointer;">
            Reload
        </button>
    </div>

    <!-- Theme initialization - prevents FOUC -->
    <script>
        (function() {
            try {
                var theme = 'light';
                var stored = localStorage.getItem('settings-storage');
                if (stored) {
                    var parsed = JSON.parse(stored);
                    if (parsed.state && parsed.state.theme) theme = parsed.state.theme;
                }
                document.documentElement.classList.add(theme);
                document.documentElement.classList.remove(theme === 'dark' ? 'light' : 'dark');

                var meta = document.getElementById('theme-color-meta');
                if (meta) meta.setAttribute('content', theme === 'dark' ? '#1f2937' : '#ffffff');

                // Apply dark theme to fallback if needed
                if (theme === 'dark') {
                    var fb = document.getElementById('app-fallback');
                    if (fb) {
                        fb.style.background = '#1f2937';
                        fb.querySelector('p').style.color = '#d1d5db';
                    }
                }
            } catch (e) {
                document.documentElement.classList.add('light');
            }

            // Safari iOS: reload when page is restored from bfcache
            window.addEventListener('pageshow', function(e) {
                if (e.persisted && navigator.onLine !== false) {
                    window.location.reload();
                }
            });

            // Catch stale chunk errors from static imports (not covered by lazyWithRetry).
            // After a deploy, iOS Safari may serve stale HTML referencing old JS chunks
            // that no longer exist. Detect this and force a single reload.
            window.addEventListener('error', function(e) {
                if (e.message && (
                    e.message.indexOf('Failed to fetch') !== -1 ||
                    e.message.indexOf('Loading chunk') !== -1 ||
                    e.message.indexOf('Loading CSS chunk') !== -1 ||
                    e.message.indexOf('dynamically imported module') !== -1
                )) {
                    if (!sessionStorage.getItem('static-chunk-retry')) {
                        sessionStorage.setItem('static-chunk-retry', '1');
                        window.location.reload();
                    }
                }
            });
            window.addEventListener('unhandledrejection', function(e) {
                var msg = e.reason && e.reason.message ? e.reason.message : '';
                if (
                    msg.indexOf('Failed to fetch') !== -1 ||
                    msg.indexOf('Loading chunk') !== -1 ||
                    msg.indexOf('dynamically imported module') !== -1
                ) {
                    if (!sessionStorage.getItem('static-chunk-retry')) {
                        sessionStorage.setItem('static-chunk-retry', '1');
                        window.location.reload();
                    }
                }
            });

            // Detect frozen/discarded page resume (Safari iOS tab suspension)
            var lastActive = Date.now();
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    var elapsed = Date.now() - lastActive;
                    var root = document.getElementById('root');
                    if (elapsed > 30000 && root && (!root.firstChild || !window.__REACT_ALIVE)) {
                        // Only reload if online — offline reload would fail and show error
                        if (navigator.onLine !== false) {
                            window.location.reload();
                        }
                    }
                }
                lastActive = Date.now();
            });

            // Show fallback UI if React hasn't mounted after 8 seconds
            setTimeout(function() {
                if (!window.__REACT_ALIVE) {
                    var fb = document.getElementById('app-fallback');
                    if (fb) fb.style.display = 'block';
                }
            }, 8000);
        })();
    </script>

    <script type="module" src="./src/main.tsx"></script>
</body>

</html>
